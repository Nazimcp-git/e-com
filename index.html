<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="LUXE — Premium fashion e-commerce store. Discover trending collections for Men, Women & Kids.">
  <meta name="theme-color" content="#FAF9F6">
  <meta property="og:title" content="LUXE — Premium Fashion Store">
  <meta property="og:description" content="Discover trending collections for Men, Women & Kids.">
  <meta property="og:type" content="website">
  <title>LUXE — Premium Fashion Store</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">

  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
  <link rel="stylesheet" href="css/responsive.css">

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>

  <!-- Razorpay SDK -->
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>
<body>
  <!-- App Root -->
  <div id="app">
    <!-- Navbar injected here -->
    <nav id="navbar-root"></nav>

    <!-- Page content injected here -->
    <main id="page-root">
      <!-- Loader shown on initial load -->
      <div class="page-loader" id="initial-loader">
        <div class="loader-spinner"></div>
        <p class="loader-text">Loading LUXE...</p>
      </div>
    </main>

    <!-- Footer injected here -->
    <footer id="footer-root"></footer>

    <!-- Toast container -->
    <div id="toast-container"></div>

    <!-- Modal container -->
    <div id="modal-root"></div>
  </div>

  <!-- App Scripts (type=module) -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
